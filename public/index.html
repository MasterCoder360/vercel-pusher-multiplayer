<!DOCTYPE html>
<html>
<head>
  <title>3D Multiplayer - NO CDN DEPENDENCIES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{margin:0;padding:0;overflow:hidden;box-sizing:border-box}
    body{font-family:Arial;background:linear-gradient(135deg,#87CEEB,#98D8C8)}
    canvas{display:block;width:100vw;height:100vh}
    #ui{position:absolute;top:20px;left:20px;z-index:100;color:white;background:rgba(0,0,0,.95);padding:25px;border-radius:15px;max-width:350px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
    #players{font-size:20px;font-weight:700;margin-bottom:15px;text-align:center}
    #chat{height:200px;overflow-y:auto;margin-bottom:15px;padding:15px;background:rgba(255,255,255,.1);border-radius:10px;font-size:14px}
    #chatInput{width:100%;padding:12px;border:none;border-radius:8px;background:white;font-size:15px;outline:none;box-shadow:0 4px 15px rgba(0,0,0,.3)}
    #instructions{font-size:13px;line-height:1.5;background:rgba(0,255,0,.2);padding:12px;border-radius:10px}
    #crosshair{position:absolute;top:50%;left:50%;width:20px;height:20px;transform:translate(-50%,-50%);pointer-events:none}
    #crosshair::before,#crosshair::after{content:'';position:absolute;border:2px solid white}
    #crosshair::before{width:20px;height:2px;top:50%;left:0;transform:translateY(-50%)}
    #crosshair::after{width:2px;height:20px;left:50%;top:0;transform:translateX(-50%)}
  </style>
</head>
