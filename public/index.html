<!DOCTYPE html>
<html>
<head>
  <title>🔥 3D MULTIPLAYER - SEE PLAYERS NOW</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial;overflow:hidden;background:#87CEEB}
    canvas{display:block}
    #ui{position:fixed;top:20px;left:20px;z-index:999;background:rgba(0,0,0,0.9);color:white;padding:20px;border-radius:15px;max-width:350px}
    #players{font-size:20px;font-weight:bold;margin-bottom:10px}
    #chat{height:200px;overflow-y:auto;padding:10px;background:rgba(255,255,255,0.1);border-radius:10px;font-size:13px;margin-bottom:10px}
    #chatInput{width:100%;padding:10px;border:none;border-radius:8px;background:white;font-size:14px}
    #status{color:#4CAF50;font-weight:bold}
  </style>
</head>
<body>
  <div id="ui">
    <div id="players">Players: 0 | <span id="status">Loading...</span></div>
    <div id="chat">Click → WASD → Open 3 tabs → SEE CUBES!</div>
    <input id="chatInput" placeholder="Chat ENTER">
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://js.pusher.com/7.2/pusher.min.js"></script>
  <script>
    // PUSHER
    const pusher = new Pusher('6291de89719e0ba9f19b',{cluster:'us2'});
    const channel = pusher.subscribe('world');
    const myId = 'p'+Math.random().toString(36).substr(2,7);
    const players = {};
    
    // EVENTS - THIS FIXES EVERYTHING
    channel.bind('pusher:subscription_succeeded',()=>{
      document.getElementById('status').innerText='LIVE ✓';
      addMsg('Connected '+myId.slice(0,6));
    });
    
    channel.bind('move',(data)=>{
      players[data.id]=data;
    });
    
    channel.bind('chat',(data)=>{
      addMsg(data.id.slice(0,6)+': '+data.msg);
    });
    
    // THREEJS
    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0.5,0.8,1);
    const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth,innerHeight);
    document.body.appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0.5));
    const sun=new THREE.DirectionalLight(0xffffff,0.8);
    sun.position.set(10,20,5);
    scene.add(sun);
    
    // GROUND
    const ground=new THREE.Mesh(
      new THREE.PlaneGeometry(100,100),
      new THREE.MeshLambertMaterial({color:0x90EE90})
    );
    ground.rotation.x=-Math.PI/2;
    scene.add(ground);
    
    // PLAYER FUNCTION
    function makePlayer(data){
      const mesh=new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshLambertMaterial({color:data.color})
      );
      scene.add(mesh);
      return mesh;
    }
    
    // MY PLAYER
    const me={x:0,y:1.7,z:0,r:0,color:Math.random()*0xffffff};
    const keys={};
    
    document.addEventListener('keydown',e=>keys[e.code]=true);
    document.addEventListener('keyup',e=>keys[e.code]=false);
    document.addEventListener('click',()=>document.body.requestPointerLock());
    
    let mx=0,my=0;
    document.addEventListener('mousemove',e=>{
      if(document.pointerLockElement){
        mx-=e.movementX*0.002;
        my-=e.movementY*0.002;
        my=Math.max(-Math.PI/2,Math.min(Math.PI/2,my));
      }
    });
    
    // CHAT
    document.getElementById('chatInput').addEventListener('keypress',e=>{
      if(e.key==='Enter'&&e.target.value.trim()){
        channel.trigger('chat',{id:myId,msg:e.target.value.trim()});
        e.target.value='';
      }
    });
    
    function addMsg(msg){
      const chat=document.getElementById('chat');
      chat.innerHTML+='<div>'+msg+'</div>';
      chat.scrollTop=chat.scrollHeight;
      document.getElementById('players').innerHTML='Players: '+(Object.keys(players).length+1)+' | <span id="status">LIVE ✓</span>';
    }
    
    // MOVE LOOP
    setInterval(()=>{
      const s=0.15;
      if(keys['KeyW'])me.z-=s;
      if(keys['KeyS'])me.z+=s;
      if(keys['KeyA'])me.x-=s;
      if(keys['KeyD'])me.x+=s;
      me.r=mx;
      
      // BROADCAST - FIXED
      channel.trigger('move',{id:myId,x:me.x,y:me.y,z:me.z,r:me.r,color:me.color});
    },33);
    
    // RENDER
    function loop(){
      requestAnimationFrame(loop);
      
      // UPDATE PLAYERS
      Object.keys(players).forEach(id=>{
        if(!players[id].mesh)players[id].mesh=makePlayer(players[id]);
        const p=players[id];
        if(p.mesh)p.mesh.position.set(p.x,p.y,p.z),p.mesh.rotation.y=p.r;
      });
      
      camera.position.set(me.x,me.y+1.6,me.z);
      camera.rotation.order='YXZ';
      camera.rotation.x=my;
      camera.rotation.y=me.r;
      
      renderer.render(scene,camera);
    }
    
    window.addEventListener('resize',()=>{
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });
    
    loop();
    console.log('✅ MULTIPLAYER READY - OPEN 3 TABS!');
  </script>
</body>
</html>
