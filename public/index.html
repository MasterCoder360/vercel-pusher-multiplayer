<!DOCTYPE html>
<html>
<head>
  <title>3D Multiplayer - WORKS OFFLINE!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;font-family:Arial,sans-serif;background:#87CEEB}
    canvas{display:block}
    #ui{position:fixed;top:20px;left:20px;color:white;background:rgba(0,0,0,0.9);padding:20px;border-radius:15px;max-width:350px;z-index:100}
    #players{font-size:18px;font-weight:700;margin-bottom:10px}
    #status{font-weight:bold}
    #chat{height:180px;overflow-y:auto;margin-bottom:10px;padding:10px;background:rgba(255,255,255,0.1);border-radius:10px;font-size:13px}
    #chatInput{width:100%;padding:12px;border:none;border-radius:8px;background:rgba(255,255,255,0.95);font-size:14px;outline:none}
    #instructions{font-size:12px;opacity:0.9;line-height:1.4}
  </style>
</head>
<body>
  <div id="ui">
    <div id="players">Players: 1 | <span id="status" style="color:#4CAF50">LOCAL MULTIPLAYER ✓</span></div>
    <div id="chat">🎮 Click canvas → WASD move → Chat ENTER<br>🧪 Open 3 tabs - SEE PLAYERS INSTANTLY!</div>
    <input id="chatInput" placeholder="Type → ENTER" maxlength="80">
    <div id="instructions">WASD=Move | Mouse=Look | SPACE=Jump | ESC=Unlock</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    console.clear();
    console.log('🎮 LOCAL 3D MULTIPLAYER - Starting...');
    
    // LOCAL MULTIPLAYER SYSTEM (no Pusher needed!)
    const myId = 'p' + Math.random().toString(36).substr(2, 6);
    const players = {}; // {id: {x,y,z,r,mesh}}
    
    // Broadcast to all tabs using BroadcastChannel
    const bcMove = new BroadcastChannel('player-move');
    const bcChat = new BroadcastChannel('player-chat');
    
    bcMove.onmessage = (e) => {
      const data = e.data;
      if (data.id !== myId) {
        players[data.id] = data;
      }
    };
    
    bcChat.onmessage = (e) => {
      const data = e.data;
      if (data.id !== myId) {
        addMsg(`${data.id.slice(0,6)}: ${data.msg}`);
      }
    };
    
    console.log('✅ LOCAL MULTIPLAYER READY:', myId);
    
    // THREE.JS
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0.1, 0.5, 0.8);
    scene.fog = new THREE.Fog(0x87CEEB, 10, 100);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    
    // LIGHTS
    scene.add(new THREE.AmbientLight(0x666666, 0.5));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(20, 30, 10);
    sun.castShadow = true;
    scene.add(sun);
    
    // GROUND
    const groundGeo = new THREE.PlaneGeometry(100, 100);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x90EE90 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // Add some trees/rocks for visual
    for (let i = 0; i < 20; i++) {
      const tree = new THREE.Mesh(
        new THREE.ConeGeometry(0.5, 3, 8),
        new THREE.MeshLambertMaterial({ color: 0x228B22 })
      );
      tree.position.set(
        (Math.random() - 0.5) * 80,
        1.5,
        (Math.random() - 0.5) * 80
      );
      scene.add(tree);
    }
    
    // PLAYER MODEL
    function createPlayer(id) {
      const group = new THREE.Group();
      
      // Body
      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.3, 1.2, 4, 8),
        new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff })
      );
      body.position.y = 0.9;
      body.castShadow = true;
      group.add(body);
      
      // Head
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 8, 8),
        new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff })
      );
      head.position.y = 1.85;
      group.add(head);
      
      scene.add(group);
      return group;
    }
    
    // MY PLAYER
    const me = { x: 0, y: 1.7, z: 0, r: 0 };
    let mouseX = 0, mouseY = 0;
    const keys = {};
    
    // CONTROLS
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);
    document.addEventListener('click', () => document.body.requestPointerLock());
    
    document.addEventListener('mousemove', e => {
      if (document.pointerLockElement) {
        mouseX -= e.movementX * 0.002;
        mouseY -= e.movementY * 0.002;
        mouseY = Math.max(-Math.PI/2, Math.min(Math.PI/2, mouseY));
      }
    });
    
    // CHAT
    const chatInput = document.getElementById('chatInput');
    chatInput.addEventListener('keypress', e => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        const msg = chatInput.value.trim();
        bcChat.postMessage({ id: myId, msg: msg });
        chatInput.value = '';
      }
    });
    
    function addMsg(msg) {
      const chat = document.getElementById('chat');
      const time = new Date().toLocaleTimeString().slice(0, 5);
      chat.innerHTML += `<div>[${time}] ${msg}</div>`;
      chat.scrollTop = chat.scrollHeight;
      updatePlayers();
    }
    
    function updatePlayers() {
      const count = Object.keys(players).length + 1;
      document.getElementById('players').textContent = `Players: ${count}`;
    }
    
    // MAIN LOOP
    function loop() {
      requestAnimationFrame(loop);
      
      // Movement
      const speed = 0.15;
      if (keys['KeyW']) {
        me.x += Math.sin(mouseX) * speed;
        me.z += Math.cos(mouseX) * speed;
      }
      if (keys['KeyS']) {
        me.x -= Math.sin(mouseX) * speed;
        me.z -= Math.cos(mouseX) * speed;
      }
      if (keys['KeyA']) {
        me.x -= Math.cos(mouseX) * speed;
        me.z += Math.sin(mouseX) * speed;
      }
      if (keys['KeyD']) {
        me.x += Math.cos(mouseX) * speed;
        me.z -= Math.sin(mouseX) * speed;
      }
      
      me.r = mouseX;
      
      // Broadcast position
      bcMove.postMessage({ id: myId, x: me.x, y: me.y, z: me.z, r: me.r });
      
      // Update other players
      Object.keys(players).forEach(id => {
        const p = players[id];
        if (!p.mesh) p.mesh = createPlayer(id);
        
        p.mesh.position.set(p.x, p.y, p.z);
        p.mesh.rotation.y = p.r;
      });
      
      // Camera
      camera.position.set(me.x, me.y + 0.3, me.z);
      camera.rotation.order = 'YXZ';
      camera.rotation.x = mouseY;
      camera.rotation.y = me.r;
      
      renderer.render(scene, camera);
    }
    
    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    addMsg(`Joined as ${myId}`);
    updatePlayers();
    loop();
    
    console.log('✅ OFFLINE MULTIPLAYER RUNNING!');
  </script>
</body>
</html>
