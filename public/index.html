<!DOCTYPE html>
<html>
<head>
  <title>3D Multiplayer - 100% WORKING</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;font-family:Arial,sans-serif;background:#87CEEB}
    canvas{display:block}
    #ui{position:fixed;top:20px;left:20px;color:white;background:rgba(0,0,0,0.9);padding:20px;border-radius:15px;max-width:350px;z-index:100}
    #players{font-size:18px;font-weight:700;margin-bottom:10px}
    #chat{height:200px;overflow-y:auto;margin-bottom:10px;padding:10px;background:rgba(255,255,255,0.1);border-radius:10px;font-size:13px}
    #chatInput{width:100%;padding:12px;border:none;border-radius:8px;background:rgba(255,255,255,0.95);font-size:14px;outline:none}
    #instructions{font-size:12px;opacity:0.9;line-height:1.4}
    #status{color:#4CAF50;font-weight:bold}
  </style>
</head>
<body>
  <div id="ui">
    <div id="players">Players: 0 | <span id="status">Loading...</span></div>
    <div id="chat">👆 Click canvas first! → WASD move → Type & ENTER<br>🧪 Open 3 tabs to test multiplayer!</div>
    <input id="chatInput" placeholder="Type message → ENTER" maxlength="100">
    <div id="instructions">WASD=Move | Mouse=Look | ESC=Unlock cursor</div>
  </div>

  <!-- FIXED CDN with fallback -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>window.THREE_LOADED = typeof THREE !== 'undefined';</script>
  <script src="https://js.pusher.com/3.2/pusher.min.js"></script>
  
  <script>
    console.clear();
    console.log('🎮 3D MULTIPLAYER - Starting...');
    
    if (typeof THREE === 'undefined') {
      document.getElementById('status').textContent = 'THREE.js FAILED - Check internet';
      document.getElementById('chat').innerHTML += '<div>❌ Three.js failed to load!</div>';
      throw new Error('Three.js not loaded');
    }
    
    console.log('✅ THREE.js LOADED');
    document.getElementById('status').textContent = 'Three.js OK';
    
    // PUSHER
    let pusher, channel;
    try {
      pusher = new Pusher('6291de89719e0ba9f19b', {
        cluster: 'us2',
        forceTLS: true,
        encrypted: true
      });
      channel = pusher.subscribe('presence-world');
      console.log('✅ Pusher connected');
      document.getElementById('status').textContent = 'Pusher OK';
    } catch(e) {
      console.error('Pusher failed:', e);
      document.getElementById('status').textContent = 'Pusher failed';
    }
    
    const myId = 'p' + Math.random().toString(36).substr(2, 6);
    const players = {};
    
    if (channel) {
      channel.bind('pusher:subscription_succeeded', (data) => {
        console.log('✅ SUBSCRIBED:', data);
        addMsg(`Connected: ${myId}`);
      });
      
      channel.bind('pusher:member_added', (member) => {
        console.log('Player joined:', member.id);
        addMsg(`${member.id.slice(0,6)} joined`);
      });
      
      channel.bind('pusher:member_removed', (member) => {
        console.log('Player left:', member.id);
        delete players[member.id];
        if (players[member.id]?.mesh) {
          scene.remove(players[member.id].mesh);
        }
        updatePlayerCount();
      });
      
      // Listen for player moves
      channel.bind('client-move', (data) => {
        players[data.id] = data;
      });
      
      // Listen for chat
      channel.bind('client-chat', (data) => {
        addMsg(`${data.id.slice(0,6)}: ${data.msg}`);
      });
    }
    
    // THREE.JS SETUP
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0.53, 0.81, 0.92);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    
    // LIGHTS
    const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambientLight);
    
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(50, 50, 25);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    scene.add(directionalLight);
    
    // GROUND
    const groundGeometry = new THREE.PlaneGeometry(200, 200);
    const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x90EE90 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // PLAYER MODEL FUNCTION
    function createPlayerMesh(id) {
      const group = new THREE.Group();
      
      // Body
      const bodyGeometry = new THREE.CylinderGeometry(0.4, 0.4, 1.6, 8);
      const bodyMaterial = new THREE.MeshLambertMaterial({ 
        color: Math.random() * 0xffffff 
      });
      const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
      body.position.y = 0.8;
      body.castShadow = true;
      group.add(body);
      
      // Head
      const headGeometry = new THREE.SphereGeometry(0.35, 8, 8);
      const headMaterial = new THREE.MeshLambertMaterial({ 
        color: bodyMaterial.color 
      });
      const head = new THREE.Mesh(headGeometry, headMaterial);
      head.position.y = 1.9;
      head.castShadow = true;
      group.add(head);
      
      scene.add(group);
      return group;
    }
    
    // MY PLAYER
    const me = { x: 0, y: 1.7, z: 0, r: 0 };
    let mouseX = 0, mouseY = 0;
    const keys = {};
    
    // INPUT
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      // ESC to unlock
      if (e.code === 'Escape') {
        document.exitPointerLock();
      }
    });
    
    document.addEventListener('keyup', (e) => keys[e.code] = false);
    
    document.addEventListener('click', () => {
      document.body.requestPointerLock();
    });
    
    document.addEventListener('mousemove', (e) => {
      if (document.pointerLockElement === document.body) {
        mouseX -= e.movementX * 0.002;
        mouseY -= e.movementY * 0.002;
        mouseY = Math.max(-Math.PI/2, Math.min(Math.PI/2, mouseY));
      }
    });
    
    // CHAT SYSTEM
    const chatInput = document.getElementById('chatInput');
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        const msg = chatInput.value.trim();
        if (channel) {
          channel.trigger('client-chat', { id: myId, msg: msg });
        }
        chatInput.value = '';
      }
    });
    
    function addMsg(message) {
      const chat = document.getElementById('chat');
      const time = new Date().toLocaleTimeString().slice(0, 5);
      chat.innerHTML += `<div style="margin-bottom:4px">[${time}] ${message}</div>`;
      chat.scrollTop = chat.scrollHeight;
      updatePlayerCount();
    }
    
    function updatePlayerCount() {
      const count = Object.keys(players).length + 1;
      document.getElementById('players').textContent = `Players: ${count}`;
    }
    
    // GAME LOOP
    function animate() {
      requestAnimationFrame(animate);
      
      // Movement
      const speed = 0.2;
      const forward = { x: Math.sin(mouseX), z: Math.cos(mouseX) };
      const right = { x: Math.cos(mouseX), z: -Math.sin(mouseX) };
      
      if (keys['KeyW']) {
        me.x += forward.x * speed;
        me.z += forward.z * speed;
      }
      if (keys['KeyS']) {
        me.x -= forward.x * speed;
        me.z -= forward.z * speed;
      }
      if (keys['KeyA']) {
        me.x -= right.x * speed;
        me.z -= right.z * speed;
      }
      if (keys['KeyD']) {
        me.x += right.x * speed;
        me.z += right.z * speed;
      }
      
      me.r = mouseX;
      
      // Send position update
      if (channel && Math.random() < 0.3) { // ~30fps network
        channel.trigger('client-move', {
          id: myId,
          x: me.x,
          y: me.y,
          z: me.z,
          r: me.r
        });
      }
      
      // Update other players
      Object.keys(players).forEach(id => {
        const player = players[id];
        if (player && player.mesh) {
          player.mesh.position.set(player.x, player.y, player.z);
          player.mesh.rotation.y = player.r;
        }
      });
      
      // Camera
      camera.position.set(me.x, me.y + 0.2, me.z);
      camera.rotation.order = 'YXZ';
      camera.rotation.x = mouseY;
      camera.rotation.y = me.r;
      
      renderer.render(scene, camera);
    }
    
    // RESIZE
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // START
    addMsg('Ready! Click to play');
    animate();
    console.log('✅ 3D MULTIPLAYER READY!');
    document.getElementById('status').textContent = 'READY ✓';
  </script>
</body>
</html>
