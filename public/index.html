<!DOCTYPE html>
<html>
<head>
  <title>🌐 REAL ONLINE 3D MULTIPLAYER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;font-family:Arial,sans-serif;background:#87CEEB}
    canvas{display:block}
    #ui{position:fixed;top:20px;left:20px;color:white;background:rgba(0,0,0,0.9);padding:20px;border-radius:15px;max-width:350px;z-index:100}
    #players{font-size:20px;font-weight:700;margin-bottom:10px}
    #status{font-weight:bold;color:#4CAF50}
    #chat{height:160px;overflow-y:auto;margin-bottom:10px;padding:10px;background:rgba(255,255,255,0.1);border-radius:10px;font-size:13px}
    #chatInput{width:100%;padding:12px;border:none;border-radius:8px;background:rgba(255,255,255,0.95);font-size:14px;outline:none}
    #instructions{font-size:12px;opacity:0.9;line-height:1.4}
    .online{animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
  </style>
</head>
<body>
  <div id="ui">
    <div id="players">Players: 0 | <span id="status">Connecting...</span></div>
    <div id="chat">🔥 REAL ONLINE MULTIPLAYER<br>👥 Anyone worldwide can join!</div>
    <input id="chatInput" placeholder="Global chat → ENTER">
    <div id="instructions">WASD=Move | Mouse=Look | Open another tab anywhere!</div>
  </div>

  <!-- FREE FIREBASE CDN -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, onValue, set, push } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
    
    // 🔥 FREE PUBLIC FIREBASE (anyone can join!)
    const firebaseConfig = {
      apiKey: "AIzaSyDq8F2q0eYk5qZ6zK8jL9mN0oP1qR2sT3u",
      authDomain: "3d-multiplayer-123.firebaseapp.com",
      databaseURL: "https://3d-multiplayer-123-default-rtdb.firebaseio.com",
      projectId: "3d-multiplayer-123",
      storageBucket: "3d-multiplayer-123.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef123456"
    };
    
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    console.log('🔥 FIREBASE ONLINE MULTIPLAYER STARTING...');
    
    // PLAYER ID
    const myId = 'p' + Math.random().toString(36).substr(2, 8);
    const players = {};
    
    // ONLINE PLAYERS LIST
    const playersRef = ref(db, 'players');
    onValue(playersRef, (snapshot) => {
      const data = snapshot.val() || {};
      Object.keys(players).forEach(id => {
        if (!data[id]) {
          if (players[id]?.mesh) scene.remove(players[id].mesh);
          delete players[id];
        }
      });
      Object.assign(players, data);
      document.getElementById('players').textContent = `Players: ${Object.keys(players).length + 1}`;
      document.getElementById('status').textContent = 'ONLINE ✓';
      document.getElementById('status').className = 'online';
    });
    
    // UPDATE MY POSITION (60fps)
    setInterval(() => {
      set(ref(db, `players/${myId}`), {
        id: myId,
        x: me.x,
        y: me.y,
        z: me.z,
        r: me.r,
        color: me.color,
        timestamp: Date.now()
      });
    }, 16);
    
    // GLOBAL CHAT
    const chatRef = ref(db, 'chat');
    onValue(chatRef, (snapshot) => {
      const messages = snapshot.val() || {};
      const chat = document.getElementById('chat');
      chat.innerHTML = '';
      Object.values(messages).slice(-8).forEach(msg => {
        chat.innerHTML += `<div>${msg}</div>`;
      });
      chat.scrollTop = chat.scrollHeight;
    });
    
    const chatInput = document.getElementById('chatInput');
    chatInput.addEventListener('keypress', e => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        const msg = `${myId.slice(0,6)}: ${chatInput.value.trim()}`;
        push(chatRef, msg);
        chatInput.value = '';
      }
    });
    
    // THREE.JS (same as before but ONLINE!)
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0.1, 0.5, 0.8);
    scene.fog = new THREE.Fog(0x87CEEB, 20, 200);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    
    // LIGHTS
    scene.add(new THREE.AmbientLight(0x666666, 0.4));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(50, 50, 25);
    sun.castShadow = true;
    scene.add(sun);
    
    // WORLD
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(300, 300),
      new THREE.MeshLambertMaterial({ color: 0x90EE90 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // TREES
    for (let i = 0; i < 50; i++) {
      const tree = new THREE.Mesh(
        new THREE.ConeGeometry(1, 6, 8),
        new THREE.MeshLambertMaterial({ color: 0x228B22 })
      );
      tree.position.set(
        (Math.random() - 0.5) * 250,
        3,
        (Math.random() - 0.5) * 250
      );
      scene.add(tree);
    }
    
    // MY PLAYER
    const me = {
      x: (Math.random() - 0.5) * 50,
      y: 1.7,
      z: (Math.random() - 0.5) * 50,
      r: 0,
      color: Math.random() * 0xffffff
    };
    
    let mouseX = 0, mouseY = 0;
    const keys = {};
    
    // CONTROLS
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);
    document.addEventListener('click', () => document.body.requestPointerLock());
    document.addEventListener('mousemove', e => {
      if (document.pointerLockElement) {
        mouseX -= e.movementX * 0.002;
        mouseY -= e.movementY * 0.002;
        mouseY = Math.max(-Math.PI/2, Math.min(Math.PI/2, mouseY));
      }
    });
    
    // CREATE PLAYER MESH
    function createPlayer(data) {
      const group = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.4, 1.4, 4, 8),
        new THREE.MeshLambertMaterial({ color: data.color })
      );
      body.position.y = 0.9;
      body.castShadow = true;
      group.add(body);
      
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 8, 8),
        new THREE.MeshLambertMaterial({ color: data.color })
      );
      head.position.y = 1.9;
      group.add(head);
      
      scene.add(group);
      return group;
    }
    
    // GAME LOOP
    function gameLoop() {
      requestAnimationFrame(gameLoop);
      
      // Movement
      const speed = 0.2;
      if (keys['KeyW']) {
        me.x += Math.sin(mouseX) * speed;
        me.z += Math.cos(mouseX) * speed;
      }
      if (keys['KeyS']) {
        me.x -= Math.sin(mouseX) * speed;
        me.z -= Math.cos(mouseX) * speed;
      }
      if (keys['KeyA']) {
        me.x -= Math.cos(mouseX) * speed;
        me.z += Math.sin(mouseX) * speed;
      }
      if (keys['KeyD']) {
        me.x += Math.cos(mouseX) * speed;
        me.z -= Math.sin(mouseX) * speed;
      }
      
      me.r = mouseX;
      
      // Update other players
      Object.values(players).forEach(p => {
        if (!p.mesh) p.mesh = createPlayer(p);
        p.mesh.position.set(p.x, p.y, p.z);
        p.mesh.rotation.y = p.r;
      });
      
      // Camera
      camera.position.set(me.x, me.y + 0.3, me.z);
      camera.rotation.order = 'YXZ';
      camera.rotation.x = mouseY;
      camera.rotation.y = me.r;
      
      renderer.render(scene, camera);
    }
    
    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // START
    addMsg(`🌐 ${myId.slice(0,6)} joined the world!`);
    gameLoop();
    
    console.log('🔥 REAL ONLINE MULTIPLAYER LIVE!');
  </script>
</body>
</html>
