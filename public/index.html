<!DOCTYPE html>
<html>
<head>
  <title>3D Multiplayer World - Vercel + Pusher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: -apple-system, sans-serif; }
    #ui {
      position: absolute; top: 10px; left: 10px; 
      color: white; background: rgba(0,0,0,0.8); 
      padding: 15px; border-radius: 12px; max-width: 320px;
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
    }
    #chat { 
      height: 180px; overflow-y: auto; margin-bottom: 10px; 
      font-size: 13px; line-height: 1.4;
    }
    #chat div { margin-bottom: 4px; opacity: 0.9; }
    #chatInput { 
      width: 100%; padding: 8px 12px; border: none; 
      border-radius: 6px; background: rgba(255,255,255,0.9);
    }
    #players { font-weight: 600; margin-bottom: 8px; }
    #instructions { 
      font-size: 12px; opacity: 0.8; margin-top: 8px; 
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="players">Players: 0 | <span id="ping">?</span>ms</div>
    <div id="chat"></div>
    <input id="chatInput" placeholder="Press ENTER to chat..." maxlength="100">
    <div id="instructions">
      WASD: Move | Mouse: Look | SPACE: Jump<br>
      Click to lock mouse
    </div>
  </div>

  <script src="https://js.pusher.com/8.2/pusher.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r161/three.min.js"></script>
  <script src="client.js"></script>
</body>
</html>
