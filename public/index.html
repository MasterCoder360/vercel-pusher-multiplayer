<!DOCTYPE html>
<html>
<head>
  <title>Your 3D Multiplayer World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #87CEEB, #98D8E8);
    }
    #ui {
      position: absolute; top: 15px; left: 15px; 
      color: white; 
      background: rgba(0,0,0,0.85); 
      padding: 20px; 
      border-radius: 15px; 
      max-width: 350px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #chat { 
      height: 200px; 
      overflow-y: auto; 
      margin-bottom: 12px; 
      font-size: 14px; 
      line-height: 1.4;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 8px;
    }
    #chat div { margin-bottom: 6px; opacity: 0.95; }
    #chatInput { 
      width: 100%; 
      padding: 12px; 
      border: none; 
      border-radius: 8px; 
      background: rgba(255,255,255,0.95);
      font-size: 14px;
      outline: none;
    }
    #players { 
      font-weight: 600; 
      margin-bottom: 12px; 
      font-size: 16px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    #instructions { 
      font-size: 13px; 
      opacity: 0.9; 
      line-height: 1.4;
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 8px;
    }
    #status {
      position: absolute; bottom: 15px; left: 15px;
      color: #4ade80; font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="players">Players: 0 | Loading...</div>
    <div id="chat">Welcome to 3D Multiplayer World!<br>Click to play → WASD + Mouse + SPACE</div>
    <input id="chatInput" placeholder="Type message → ENTER" autocomplete="off">
    <div id="instructions">
      🎮 WASD: Move | Mouse: Look | SPACE: Jump<br>
      💬 Chat: Type → ENTER<br>
      👥 See friends as colored cubes!
    </div>
  </div>
  <div id="status">Connecting...</div>

  <!-- FIXED Three.js CDN -->
  <script src="https://unpkg.com/three@0.161.0/build/three.min.js"></script>
  <script src="https://js.pusher.com/8.2/pusher.min.js"></script>
  <script src="client.js"></script>
</body>
</html>
