<!DOCTYPE html>
<html>
<head>
  <title>✅ PUSHER 3D MULTIPLAYER - FIXED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;font-family:Arial,sans-serif;background:linear-gradient(135deg,#87CEEB,#98D8E8)}
    canvas{display:block}
    #ui{position:fixed;top:20px;left:20px;color:white;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);padding:20px;border-radius:20px;max-width:350px;z-index:999;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
    #players{font-size:20px;font-weight:700;margin-bottom:10px;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
    #status{font-size:16px;color:#4CAF50;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
    #chat{height:180px;overflow-y:auto;margin-bottom:10px;padding:10px;background:rgba(255,255,255,0.1);border-radius:15px;font-size:13px;border:1px solid rgba(255,255,255,0.2)}
    #chatInput{width:100%;padding:12px;border:none;border-radius:12px;background:rgba(255,255,255,0.95);font-size:14px;outline:none;box-shadow:0 4px 15px rgba(0,0,0,0.2);transition:all 0.3s}
    #chatInput:focus{box-shadow:0 6px 20px rgba(76,175,80,0.4);transform:translateY(-1px)}
    #instructions{font-size:12px;opacity:0.9;line-height:1.4;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
  </style>
</head>
<body>
  <div id="ui">
    <div id="players">Players: <span id="count">0</span> | <span id="status">Connecting...</span></div>
    <div id="chat">🎮 Click canvas → WASD move → Type & ENTER<br>🔥 Open 3 tabs - multiplayer works instantly!</div>
    <input id="chatInput" placeholder="Global chat → ENTER" maxlength="60">
    <div id="instructions">WASD=Move | Mouse=Look | SPACE=Jump | ESC=Unlock cursor</div>
  </div>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script src="https://js.pusher.com/7.2/pusher.min.js"></script>
  <script>
    console.clear();
    console.log('🔥 PUSHER 3D MULTIPLAYER - COMPLETE VERSION');
    
    // PUSHER SETUP
    const pusher = new Pusher('6291de89719e0ba9f19b', {
      cluster: 'us2',
      encrypted: true
    });
    const channel = pusher.subscribe('public-world');
    const myId = 'p' + Math.random().toString(36).substr(2, 7);
    const players = {};
    
    // EVENT LISTENERS - FIXED
    channel.bind('pusher:subscription_succeeded', function() {
      console.log('✅ PUSHER CONNECTED:', myId);
      document.getElementById('status').textContent = 'ONLINE ✓';
      addMsg(myId.slice(0, 6) + ' joined');
    });
    
    channel.bind('move', function(data) {
      console.log('📍 MOVE:', data.id, data.x, data.z);
      players[data.id] = data;
      updateCount();
    });
    
    channel.bind('chat', function(data) {
      console.log('💬 CHAT:', data.msg);
      addMsg(data.id.slice(0, 6) + ': ' + data.msg);
    });
    
    // THREE.JS
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0.15, 0.55, 0.85);
    scene.fog = new THREE.Fog(0x87CEEB, 15, 120);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    
    // LIGHTING
    const ambient = new THREE.AmbientLight(0x666666, 0.5);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 0.9);
    sun.position.set(25, 35, 15);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    scene.add(sun);
    
    // GROUND
    const groundGeo = new THREE.PlaneGeometry(180, 180);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x98D8C8 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // TREES
    for (let i = 0; i < 35; i++) {
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.4, 2, 8),
        new THREE.MeshLambertMaterial({ color: 0x8B4513 })
      );
      const leaves = new THREE.Mesh(
        new THREE.ConeGeometry(1.2, 4, 8),
        new THREE.MeshLambertMaterial({ color: 0x228B22 })
      );
      leaves.position.y = 2.5;
      const tree = new THREE.Group();
      tree.add(trunk);
      tree.add(leaves);
      tree.position.x = (Math.random() - 0.5) * 140;
      tree.position.z = (Math.random() - 0.5) * 140;
      tree.position.y = 1;
      scene.add(tree);
    }
    
    // PLAYER DATA
    const me = {
      x: (Math.random() - 0.5) * 30,
      y: 1.7,
      z: (Math.random() - 0.5) * 30,
      r: 0,
      color: Math.floor(Math.random() * 0xffffff)
    };
    
    // INPUT
    const keys = {};
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);
    document.addEventListener('click', () => document.body.requestPointerLock());
    
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', e => {
      if (document.pointerLockElement) {
        mouseX -= e.movementX * 0.002;
        mouseY -= e.movementY * 0.002;
        mouseY = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, mouseY));
      }
    });
    
    // CHAT
    const chatInput = document.getElementById('chatInput');
    chatInput.addEventListener('keypress', e => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        channel.trigger('chat', {
          id: myId,
          msg: chatInput.value.trim()
        });
        chatInput.value = '';
      }
    });
    
    function addMsg(msg) {
      const chatEl = document.getElementById('chat');
      const time = new Date().toLocaleTimeString().slice(0, 5);
      chatEl.innerHTML += `<div style="margin-bottom:3px">[${time}] ${msg}</div>`;
      chatEl.scrollTop = chatEl.scrollHeight;
      updateCount();
    }
    
    function updateCount() {
      const count = Object.keys(players).length + 1;
      document.getElementById('count').textContent = count;
    }
    
    // MOVEMENT LOOP
    setInterval(() => {
      const speed = 0.18;
      if (keys['KeyW']) {
        me.x += Math.sin(mouseX) * speed;
        me.z += Math.cos(mouseX) * speed;
      }
      if (keys['KeyS']) {
        me.x -= Math.sin(mouseX) * speed;
        me.z -= Math.cos(mouseX) * speed;
      }
      if (keys['KeyA']) {
        me.x -= Math.cos(mouseX) * speed;
        me.z += Math.sin(mouseX) * speed;
      }
      if (keys['KeyD']) {
        me.x += Math.cos(mouseX) * speed;
        me.z -= Math.sin(mouseX) * speed;
      }
      me.r = mouseX;
      
      // BROADCAST POSITION
      channel.trigger('move', {
        id: myId,
        x: me.x,
        y: me.y,
        z: me.z,
        r: me.r,
        color: me.color
      });
    }, 33);
    
    // CREATE PLAYER MESH
    function createPlayer(data) {
      const group = new THREE.Group();
      
      // Body
      const bodyGeo = new THREE.CapsuleGeometry(0.35, 1.3, 4, 8);
      const bodyMat = new THREE.MeshLambertMaterial({ color: data.color });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.85;
      body.castShadow = true;
      group.add(body);
      
      // Head
      const headGeo = new THREE.SphereGeometry(0.28, 8, 8);
      const headMat = new THREE.MeshLambertMaterial({ color: data.color });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = 1.85;
      head.castShadow = true;
      group.add(head);
      
      scene.add(group);
      return group;
    }
    
    // RENDER LOOP
    function animate() {
      requestAnimationFrame(animate);
      
      // Update other players
      Object.keys(players).forEach(id => {
        const player = players[id];
        if (!player.mesh) {
          player.mesh = createPlayer(player);
        }
        if (player.mesh) {
          player.mesh.position.set(player.x, player.y, player.z);
          player.mesh.rotation.y = player.r;
        }
      });
      
      // Camera follow
      camera.position.set(me.x, me.y + 0.3, me.z);
      camera.rotation.order = 'YXZ';
      camera.rotation.x = mouseY;
      camera.rotation.y = me.r;
      
      renderer.render(scene, camera);
    }
    
    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Start
    addMsg('Ready! Click to play');
    animate();
    console.log('✅ COMPLETE MULTIPLAYER READY!');
  </script>
</body>
</html>
