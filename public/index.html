<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Multiplayer World - WORKING!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      font-family: -apple-system, Arial, sans-serif;
      background: linear-gradient(135deg, #87CEEB 0%, #98D8C8 100%);
    }
    canvas { display: block; }
    #ui {
      position: absolute; top: 20px; left: 20px; 
      color: white; background: rgba(0,0,0,0.9); 
      padding: 25px; border-radius: 20px; 
      max-width: 380px; min-width: 300px;
      backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    #players { 
      font-size: 20px; font-weight: bold; 
      margin-bottom: 15px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    #chat { 
      height: 220px; overflow-y: auto; 
      margin-bottom: 15px; font-size: 14px; 
      background: rgba(255,255,255,0.08); padding: 15px; border-radius: 12px;
    }
    #chat div { margin-bottom: 8px; opacity: 0.95; }
    #chatInput { 
      width: 100%; padding: 14px; border: none; 
      border-radius: 10px; background: rgba(255,255,255,0.95);
      font-size: 15px; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    #instructions { 
      font-size: 13px; opacity: 0.9; line-height: 1.5;
      background: rgba(0,255,0,0.2); padding: 12px; border-radius: 10px;
    }
    #debug {
      position: absolute; bottom: 20px; right: 20px;
      background: rgba(0,0,0,0.8); color: lime; padding: 15px;
      border-radius: 10px; font-family: monospace; font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="players">Players: 0 | <span id="status">Loading...</span></div>
    <div id="chat">🎮 3D Multiplayer World Loaded!<br>👥 Open more tabs to see friends!</div>
    <input id="chatInput" placeholder="💬 Type message → ENTER" autocomplete="off">
    <div id="instructions">
      🎯 <strong>Click</strong> to lock mouse<br>
      ⌨️ <strong>WASD</strong> = Move | <strong>SPACE</strong> = Jump<br>
      👀 Mouse = Look around | <strong>ESC</strong> = Unlock
    </div>
  </div>
  <div id="debug">Debug: Starting...</div>

  <!-- RELIABLE CDNs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r161/three.min.js"></script>
  <script src="https://js.pusher.com/8.2/pusher.min.js"></script>

  <script>
    console.log('🚀 3D Multiplayer Starting...');
    
    // YOUR PUSHER KEYS - WORKING!
    const PUSHER_KEY = '6291de89719e0ba9f19b';
    const PUSHER_CLUSTER = 'us2';
    
    // PUSHER
    const pusher = new Pusher(PUSHER_KEY, {
      cluster: PUSHER_CLUSTER,
      forceTLS: true
    });
    const channel = pusher.subscribe('world-channel');
    const myPlayerId = 'player-' + Math.random().toString(36).substr(2, 9);
    
    const players = {}; // All players
    let playerCount = 0;
    
    // PUSHER EVENTS - FIXED!
    channel.bind('pusher:subscription_succeeded', () => {
      console.log('✅ PUSHER CONNECTED:', myPlayerId);
      document.getElementById('status').textContent = 'Connected!';
      addChatMessage('👋 Joined as ' + myPlayerId.slice(0,8));
      document.getElementById('debug').innerHTML = `ID: ${myPlayerId.slice(0,8)} | Connected`;
    });
    
    channel.bind('client-playerMove', (data) => {
      console.log('👥 Player update:', data.id.slice(0,8), data.x.toFixed(1), data.z.toFixed(1));
      players[data.id] = data;
      playerCount = Object.keys(players).length + 1;
      document.getElementById('players').textContent = `Players: ${playerCount}`;
    });
    
    channel.bind('client-chat', (data) => {
      console.log('💬 Chat:', data.message);
      addChatMessage(`${data.id.slice(0,8)}: ${data.message}`);
    });
    
    // THREE.JS
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEFA);
    scene.fog = new THREE.Fog(0x87CEFA, 20, 100);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);
    
    // LIGHTING
    const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
    scene.add(ambientLight);
    const sunLight = new THREE.DirectionalLight(0xffffff, 1);
    sunLight.position.set(20, 30, 10);
    sunLight.castShadow = true;
    scene.add(sunLight);
    
    // WORLD - GRASS FIELD
    const groundGeometry = new THREE.PlaneGeometry(200, 200);
    const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x7EE57E });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // TREES FOR LANDMARKS
    for(let i = 0; i < 15; i++) {
      const treeTrunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.5, 3, 8),
        new THREE.MeshLambertMaterial({ color: 0x8B4513 })
      );
      const treeTop = new THREE.Mesh(
        new THREE.ConeGeometry(2, 4, 8),
        new THREE.MeshLambertMaterial({ color: 0x228B22 })
      );
      treeTop.position.y = 3;
      const tree = new THREE.Group();
      tree.add(treeTrunk, treeTop);
      tree.position.set(
        (Math.random() - 0.5) * 80,
        1.5,
        (Math.random() - 0.5) * 80
      );
      scene.add(tree);
    }
    
    // PLAYER CUBES
    function createPlayer(id) {
      const group = new THREE.Group();
      
      // Body
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 1.6, 0.8),
        new THREE.MeshLambertMaterial({ 
          color: new THREE.Color().setHSL(
            parseInt(id.slice(-6), 16) / 0xffffff, 0.8, 0.6
          )
        })
      );
      body.position.y = 0.8;
      body.castShadow = true;
      group.add(body);
      
      // Head
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.4),
        new THREE.MeshLambertMaterial({ color: 0xFFDBAC })
      );
      head.position.y = 2;
      group.add(head);
      
      scene.add(group);
      return group;
    }
    
    // MY PLAYER
    const myPlayer = { x: 0, y: 1.8, z: 0, rotY: 0 };
    const keys = {};
    
    // INPUT
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);
    document.addEventListener('click', () => {
      document.body.requestPointerLock();
      addChatMessage('🎮 Mouse locked - WASD to move!');
    });
    
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', e => {
      if (document.pointerLockElement === document.body) {
        mouseX -= e.movementX * 0.002;
        mouseY -= e.movementY * 0.002;
        mouseY = Math.max(-Math.PI/2, Math.min(Math.PI/2, mouseY));
      }
    });
    
    // CHAT
    document.getElementById('chatInput').addEventListener('keypress', e => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        channel.trigger('client-chat', {
          id: myPlayerId,
          message: e.target.value.trim()
        });
        e.target.value = '';
      }
    });
    
    function addChatMessage(msg) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.textContent = `[${new Date().toLocaleTimeString().slice(0,5)}] ${msg}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      document.getElementById('players').textContent = `Players: ${playerCount}`;
    }
    
    // BROADCAST MOVEMENT (33fps)
    setInterval(() => {
      const speed = 0.12;
      if (keys['KeyW']) myPlayer.z -= speed;
      if (keys['KeyS']) myPlayer.z += speed;
      if (keys['KeyA']) myPlayer.x -= speed;
      if (keys['KeyD']) myPlayer.x += speed;
      
      myPlayer.rotY = mouseX;
      
      // SEND POSITION
      channel.trigger('client-playerMove', {
        id: myPlayerId,
        x: myPlayer.x,
        y: myPlayer.y,
        z: myPlayer.z,
        rotY: myPlayer.rotY
      });
    }, 30);
    
    // RENDER LOOP
    function animate() {
      requestAnimationFrame(animate);
      
      // UPDATE ALL PLAYERS
      Object.keys(players).forEach(id => {
        if (!players[id].mesh) {
          players[id].mesh = createPlayer(id);
          console.log('🎨 Created player mesh:', id.slice(0,8));
        }
        const mesh = players[id].mesh;
        const player = players[id];
        if (player && mesh) {
          mesh.position.set(player.x, player.y, player.z);
          mesh.rotation.y = player.rotY;
        }
      });
      
      // CAMERA
      camera.position.set(myPlayer.x, myPlayer.y + 1.6, myPlayer.z);
      camera.rotation.order = 'YXZ';
      camera.rotation.x = mouseY;
      camera.rotation.y = myPlayer.rotY;
      
      renderer.render(scene, camera);
    }
    
    // RESIZE
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    animate();
    console.log('✅ FULLY LOADED! Open multiple tabs!');
  </script>
</body>
</html>
